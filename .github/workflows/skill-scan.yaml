name: Skill Scanner

on:
  pull_request:
    paths:
      - ".github/skills/**"
      - "**/.github/skills/**"
      - ".github/workflows/skill-scan.yaml"
  push:
    branches: ["main"]
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      severity:
        description: "SkillSpector severity level (CRITICAL, HIGH, MEDIUM, LOW)"
        required: false
        default: "LOW"
        type: choice
        options:
          - CRITICAL
          - HIGH
          - MEDIUM
          - LOW

permissions: {}

jobs:
  discover-skills:
    name: Discover skill paths
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.find-paths.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Find all .github/skills directories
        id: find-paths
        run: |
          paths=$(find . -path '*/.github/skills' -type d \
            | sed 's|^\./||' \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "matrix=$paths" >> "$GITHUB_OUTPUT"

  skillspector-scan:
    name: SkillSpector security scan (${{ matrix.skills-path }})
    needs: discover-skills
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        skills-path: ${{ fromJson(needs.discover-skills.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Run SkillSpector scan
        uses: open-edge-platform/geti-ci/actions/skill-scan@78e175e3e91f997e168a09aadd1933da95c1ac98 # skill-scan/v0.1.0
        with:
          skills-path: ${{ matrix.skills-path }}
          severity-level: ${{ github.event_name == 'pull_request' && 'HIGH' || github.event.inputs.severity || 'LOW' }}
          fail-on-findings: ${{ github.event_name == 'pull_request' && 'true' || 'false' }}

  skill-validator-scan:
    name: skill-validator scan (${{ matrix.skills-path }})
    needs: discover-skills
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        skills-path: ${{ fromJson(needs.discover-skills.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Run skill-validator
        uses: open-edge-platform/geti-ci/actions/skill-validator@ac8d35f5bb94a135ec778498cf5082bc70babffe # skill-validator/v0.1.0
        with:
          skills-path: ${{ matrix.skills-path }}
          strict: ${{ github.event_name == 'pull_request' && 'true' || 'false' }}
          fail-on-findings: ${{ github.event_name == 'pull_request' && 'true' || 'false' }}